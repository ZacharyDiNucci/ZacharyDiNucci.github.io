<section id="contact-form" class="big-section bg-light">
    <div class="container w60" style="padding-bottom: 20px;">
        <form id="contactForm" data-toggle="validator">
            <div class="row">
                <div class="col-md-6 sub-col-left">
                    <div class="form-group">
                        <input type="text" class="form-control" id="name" placeholder="*Name" required>
                        <div class="help-block with-errors"></div>
                    </div>
                </div><!-- / sub-column -->
                <div class="col-md-6 sub-col-right">
                    <div class="form-group">
                        <input type="email" class="form-control" id="email" placeholder="*Email" required>
                        <div class="help-block with-errors"></div>
                    </div>
                </div><!-- / sub-column -->
                <div class="col-md-12">
                    <div class="form-group">
                        <input type="text" class="form-control" id="msg_subject" placeholder="Subject">
                        <div class="help-block with-errors"></div>
                    </div>
                </div><!-- / sub-column -->
                <div class="col-md-12">
                    <div class="form-group mb-2">
                        <textarea id="message" class="form-control" rows="5" placeholder="*Message" required></textarea>
                        <div class="help-block with-errors text-area"></div>
                    </div>
                </div><!-- / sub-column -->
            </div><!-- / row -->

            <div class="text-center">
                <button type="submit" id="form-submit" class="btn btn-submit btn-primary rectangle"><span>Send Message</span></button>
                <div id="msgSubmit" class="h3 text-center hidden"></div>
                <div class="clearfix"></div>
            </div><!-- / text-center -->
        </form><!-- / contactform -->
    </div><!-- / container -->
</section><!-- / contact-form -->
